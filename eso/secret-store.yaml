# ==============================================================================
# FILE: eso/secret-store.yaml
# MỤC ĐÍCH: Khai báo tài nguyên SecretStore (thuộc External Secrets Operator) để liên kết kết nối tới AWS Secrets Manager ở khu vực cụ thể bằng IAM Credentials.
#
# CÂU HỎI MENTOR CÓ THỂ HỎI:
# 1. Q: Sự khác biệt giữa `SecretStore` và `ClusterSecretStore` là gì?
#    A: `SecretStore` bị giới hạn phạm vi trong một namespace cụ thể và chỉ chia sẻ secret cho namespace đó.
#       `ClusterSecretStore` là tài nguyên cấp cụm (Cluster-wide), cho phép tất cả các namespace tham chiếu và lấy secrets từ AWS.
# 2. Q: Làm thế nào để bảo mật thông tin xác thực AWS của SecretStore (`awssm-secret`)?
#    A: Tài khoản IAM tương ứng với cặp khóa này chỉ được cấp duy nhất policy đọc đúng Secret ID `db-password` (Least Privilege),
#       ngăn chặn việc lạm dụng quyền hạn để đọc các secret nhạy cảm khác trên AWS.
# ==============================================================================


apiVersion: external-secrets.io/v1beta1
# Loại tài nguyên cấu hình kết nối ở cấp độ Namespace. 
# (Nếu muốn dùng chung toàn bộ cluster thì dùng ClusterSecretStore)
kind: SecretStore
metadata:
  name: aws-secretsmanager   # Tên của SecretStore
  namespace: demo            # Namespace lưu trữ và áp dụng
  annotations:
    # Sync Wave 4: Đồng bộ hóa SecretStore ở Wave 4 (sau khi Operator đã chạy ổn định ở Wave -1)
    argocd.argoproj.io/sync-wave: "4"
spec:
  provider:
    # Chỉ định nhà cung cấp dịch vụ đám mây là AWS
    aws:
      service: SecretsManager
      region: ap-southeast-1 # Vùng đặt Secrets Manager (ở đây là Singapore)
      auth:
        # Xác thực bằng cặp Access Key ID và Secret Access Key lưu trong Kubernetes Secret nội bộ tên là `awssm-secret`
        secretRef:
          # Chỉ định Secret chứa AWS Access Key ID
          accessKeyIDSecretRef:
            name: awssm-secret
            key: access-key
          # Chỉ định Secret chứa AWS Secret Access Key
          secretAccessKeySecretRef:
            name: awssm-secret
            key: secret-access-key

