# Service: Expose API pods
# Sync wave 1: Expose pods sau khi Rollout đã tạo
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: api
  ports:
  - name: http
    port: 80
    targetPort: 8080
