# ==============================================================================
# FILE: eso/external-secret.yaml
# MỤC ĐÍCH: Định nghĩa ánh xạ (map) khóa bí mật cụ thể từ AWS Secrets Manager về Kubernetes Secret nội bộ trong cụm.
#
# CÂU HỎI MENTOR CÓ THỂ HỎI:
# 1. Q: Tại sao chúng ta dùng External Secrets Operator (ESO) thay vì trực tiếp gọi AWS SDK trong code ứng dụng?
#    A: Tách biệt mối quan tâm (Separation of Concerns). Nhà phát triển không cần viết code kết nối AWS SDK, quản lý credentials AWS trong code.
#       Kubernetes/ESO sẽ tự động lo việc kéo mật khẩu và đưa vào cụm bảo mật dưới dạng Secret nguyên bản của K8s.
# 2. Q: Tần suất đồng bộ dữ liệu bí mật được thiết lập như thế nào và có nhược điểm gì?
#    A: Qua thuộc tính `refreshInterval: 10s` (mỗi 10 giây). Đồng bộ nhanh giúp cập nhật mật khẩu mới tức thì,
#       nhưng nhược điểm là tăng số lượng API request lên AWS Secrets Manager, có thể làm phát sinh thêm chi phí nhỏ.
# ==============================================================================


apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-db-secret        # Tên của tài nguyên ExternalSecret
  namespace: demo            # Namespace lưu trữ và áp dụng
  annotations:
    # Sync Wave 5: Đồng bộ hóa cấu hình map ở Wave 5 (chạy ngay sau SecretStore ở Wave 4)
    argocd.argoproj.io/sync-wave: "5"
spec:
  # Khoảng thời gian định kỳ để ESO kiểm tra và đồng bộ lại giá trị từ AWS về K8s. 
  # Ở đây đặt là 10 giây (10s) giúp thay đổi mật khẩu từ AWS được cập nhật cực nhanh về cụm Kubernetes.
  refreshInterval: "10s"
  
  # Tham chiếu tới SecretStore đã cấu hình ở bước trước
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  
  # Định nghĩa đích đến (Target K8s Secret sẽ được ESO sinh ra tự động)
  target:
    name: api-db-secret      # Tên của Kubernetes Secret được tạo ra trong cụm
    creationPolicy: Owner    # Quy định ESO là chủ sở hữu (nếu xóa ExternalSecret thì K8s Secret tự động bị xóa theo)
  
  # Danh sách dữ liệu bí mật cần ánh xạ
  data:
    # - `secretKey`: Tên Key lưu trong Kubernetes Secret (ví dụ: data.db-password)
    # - `remoteRef.key`: Tên của Secret lưu trên AWS Secrets Manager (ở đây tên Secret ID trên AWS là `db-password`)
    - secretKey: db-password
      remoteRef:
        key: db-password

