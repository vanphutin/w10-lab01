# Build and push Docker image to GitHub Container Registry
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.semver.outputs.version }}
            type=raw,value=v${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      - name: Build Docker image locally (for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:local-scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:local-scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the published Docker images
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
            echo "Signing $tag..."
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$tag"
          done

      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Create git tag
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.semver.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.semver.outputs.version }} already exists, skipping tag creation."
          else
            git tag v${{ steps.semver.outputs.version }}
            git push origin v${{ steps.semver.outputs.version }}
          fi
