# ==============================================================================
# FILE: argocd/apps/gatekeeper-constraints.yaml
# MỤC ĐÍCH: Deploy OPA Gatekeeper Constraints và Templates để kiểm soát an ninh cụm.
#
# CÂU HỎI MENTOR CÓ THỂ HỎI:
# 1. Q: Tại sao cần sync-wave "3" cho chính sách OPA?
#    A: Đảm bảo chính sách được cài đặt sau khi Gatekeeper Operator (Wave -2) và các tài nguyên ứng dụng khác đã sẵn sàng.
# ==============================================================================

# apiVersion định nghĩa API group và version của tài nguyên ArgoCD Application
apiVersion: argoproj.io/v1alpha1
# kind định nghĩa loại tài nguyên là Application (quản lý bởi ArgoCD)
kind: Application
metadata:
  name: gatekeeper-constraints      # Tên ứng dụng trong ArgoCD
  namespace: argocd                 # Namespace chạy ArgoCD
  annotations:
    # sync-wave quyết định thứ tự deploy. Wave 3 chạy sau khi cài đặt xong Gatekeeper và các App khác
    argocd.argoproj.io/sync-wave: "3"
spec:
  # project phân nhóm ứng dụng, 'default' là project mặc định
  project: default
  # source khai báo nguồn chứa các file chính sách OPA
  source:
    # repoURL chỉ định kho lưu trữ Git chứa cấu hình chính sách
    repoURL: https://github.com/vanphutin/w10-lab01.git
    # path trỏ tới thư mục chứa các Constraint và ConstraintTemplate trong repo
    path: gatekeeper/constraints
    # targetRevision chỉ định nhánh Git (ở đây là main)
    targetRevision: main
  # destination chỉ định cụm Kubernetes đích để deploy
  destination:
    # server trỏ tới API Server cụm nội bộ hiện tại
    server: https://kubernetes.default.svc
    # namespace đích nơi áp dụng chính sách (ở đây là gatekeeper-system)
    namespace: gatekeeper-system
  # syncPolicy khai báo chính sách đồng bộ tự động giữa Git và cụm
  syncPolicy:
    automated:
      prune: true                   # Tự động xóa các chính sách cũ nếu chúng bị xóa khỏi Git
      selfHeal: true                # Tự động sửa lại nếu cấu hình dưới cụm bị sửa lệch Git
    syncOptions:
    # Sử dụng Server-Side Apply để nạp các tài nguyên cấu hình lớn
    - ServerSideApply=true
    # Bỏ qua DryRun nếu chưa định nghĩa sẵn CRD để tránh lỗi đồng bộ
    - SkipDryRunOnMissingResource=true
