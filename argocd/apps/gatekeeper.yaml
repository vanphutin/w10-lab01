# ==============================================================================
# FILE: argocd/apps/gatekeeper.yaml
# MỤC ĐÍCH: Cài đặt OPA Gatekeeper Operator và các webhook của nó.
#
# CÂU HỎI MENTOR CÓ THỂ HỎI:
# 1. Q: Tại sao sync-wave của Gatekeeper Operator được đặt là "-2" (sớm nhất)?
#    A: Vì nó là admission controller, nó cần chạy trước để kiểm soát an ninh cho các tài nguyên được deploy ở các wave sau.
# ==============================================================================

# apiVersion định nghĩa API group và version của tài nguyên ArgoCD Application
apiVersion: argoproj.io/v1alpha1
# kind định nghĩa loại tài nguyên là Application (quản lý bởi ArgoCD)
kind: Application
metadata:
  name: gatekeeper-operator         # Tên ứng dụng trong ArgoCD
  namespace: argocd                 # Namespace chạy ArgoCD
  annotations:
    # sync-wave quyết định thứ tự deploy. Wave -2 chạy đầu tiên để thiết lập Admission Webhook
    argocd.argoproj.io/sync-wave: "-2"
spec:
  # project phân nhóm ứng dụng, 'default' là project mặc định
  project: default
  # source khai báo nguồn cài đặt Helm chart của OPA Gatekeeper
  source:
    # repoURL chỉ định kho Helm repo chứa chart
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    # chart chỉ định tên của Helm chart cần cài đặt
    chart: gatekeeper
    # targetRevision chỉ định phiên bản cụ thể của chart (ở đây là 3.14.0)
    targetRevision: 3.14.0
  # destination chỉ định cụm Kubernetes đích để deploy
  destination:
    # server trỏ tới API Server cụm nội bộ hiện tại
    server: https://kubernetes.default.svc
    # namespace đích nơi cài đặt Operator
    namespace: gatekeeper-system
  # syncPolicy khai báo chính sách đồng bộ tự động
  syncPolicy:
    automated:
      prune: true                   # Tự động dọn dẹp tài nguyên thừa
      selfHeal: true                # Tự động sửa lại nếu cấu hình dưới cụm bị sửa lệch Git
    syncOptions:
    # Tự động tạo namespace đích 'gatekeeper-system' nếu chưa có
    - CreateNamespace=true
    # Sử dụng Server-Side Apply để nạp các tài nguyên lớn (như CRDs của Gatekeeper)
    - ServerSideApply=true
